version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      cargo-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/devvit-app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "docker"
    # The Dockerfile lives at the repo root (combined Astro + Rust image),
    # not under backend/. Pointing at "/backend" makes Dependabot miss it.
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
