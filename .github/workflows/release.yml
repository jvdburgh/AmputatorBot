name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional override of the image tag (otherwise derived from the git SHA)"
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
      SCW_DEFAULT_REGION: fr-par
      SCW_CONTAINER_ID: ${{ secrets.SCW_CONTAINER_ID }}
      REGISTRY: rg.fr-par.scw.cloud/amputatorbot
      IMAGE_NAME: amputatorbot
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v4
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Compute image tags
        id: tags
        run: |
          sha_short=$(git rev-parse --short HEAD)
          override='${{ inputs.tag }}'
          if [ -n "$override" ]; then
            primary_tag="$override"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            primary_tag="${{ github.ref_name }}"
          else
            primary_tag="$sha_short"
          fi
          echo "sha=$sha_short"        >> "$GITHUB_OUTPUT"
          echo "primary=$primary_tag"  >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.primary }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install scw CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Update Scaleway container image, triggers redeploy
        run: |
          scw container container update "$SCW_CONTAINER_ID" \
            image="${REGISTRY}/${IMAGE_NAME}:${{ steps.tags.outputs.primary }}"

      - name: Poll for healthy
        # Container status: ready (success) | error (deploy failed; previous
        # revision keeps serving) | anything else (still deploying).
        run: |
          for i in $(seq 1 30); do
            status=$(scw container container get "$SCW_CONTAINER_ID" -o json | jq -r .status)
            echo "attempt $i: status=$status"
            case "$status" in
              ready)   exit 0 ;;
              error)   echo "::error::container deploy reported error"; exit 1 ;;
            esac
            sleep 10
          done
          echo "::error::container did not reach 'ready' within 5 minutes"
          exit 1
