# Lefthook pre-commit hooks.
# Setup: `lefthook install` once after cloning.
# https://lefthook.dev

pre-commit:
  parallel: true
  commands:
    backend-fmt:
      root: "backend/"
      glob: "*.rs"
      run: cargo fmt --all -- --check

    backend-clippy:
      root: "backend/"
      glob: "*.rs"
      run: cargo clippy --all-targets --quiet -- -D warnings

    devvit-app-biome:
      root: "devvit-app/"
      glob: "*.{js,ts,jsx,tsx,json,jsonc}"
      run: pnpm exec biome check --no-errors-on-unmatched .

    website-biome:
      root: "website/"
      glob: "*.{js,ts,jsx,tsx,json,jsonc,astro}"
      run: pnpm exec biome check --no-errors-on-unmatched .

commit-msg:
  commands:
    # Soft check — warns if a commit message looks completely unstructured,
    # but doesn't enforce strict Conventional Commits.
    not-empty:
      run: |
        if ! grep -qE "[A-Za-z]" "$1"; then
          echo "Empty commit message"
          exit 1
        fi
