services:
  postgres:
    image: postgres:17-alpine
    container_name: amputatorbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: amputatorbot
      POSTGRES_PASSWORD: amputatorbot
      POSTGRES_DB: amputatorbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amputatorbot -d amputatorbot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
